<!DOCTYPE html>

<html>
    <head>
        <title>Functions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script src="assets/main.js" defer></script>
    </head>


    <body>
        <h1>Drinks Menu</h1>
        <form>
            <legend>What's your mood today?</legend>
            <section>
                <button id="bold">Bold</button>
                <button id="warmandcozy">Warm and cozy</button>
                <button id="joyful">Joyful</button>
                <button id="freshandalive">Fresh and alive</button>
                <button id="dreamy">Dreamy</button>
            </section>
            <div id="slider-container">
                <label for="intensity">How intense?</label>
                <input type="range" id="intensity" min="0" max="3">
            </div>
            <div>
                <button type="submit">Submit</button>
            </div>
        </form>


            <div id="result"></div>

        <ul id="mood"></ul>

 

    </body>

</html>
