    <body>
        <section id="hero" class="hero">

            <section class="herotext">

            </section>

        <section id="input-section" class="input-section">
            <section>
                <a href="#" class="back-to-top">Back to top</a>
            </section>

            <form>
                <fieldset>
                    <legend>What's your mood today?</legend>
                        <section class="mood-buttons">
                            <button type="button" id="bold">Bold</button>
                            <button type="button" id="warmandcozy">Warm and cozy</button>
                            <button type="button" id="joyful">Joyful</button>
                            <button type="button" id="freshandalive">Fresh and alive</button>
                            <button type="button" id="dreamy">Dreamy</button>
                        </section>

                    <div class="slider-container">
                        <label for="intensity">Please drag the slider to select how strong you want your drink to be</label>
                        <input type="range" id="intensity" min="1" max="3">

                        <div class="slider-label">
                            <span>Light</span>
                            <span>Intense</span>
                        </div>
                    </div>
                    
                    <section>
                        <button type="submit" class="submit-button" disabled>Submit</button>
                    </section>
                </fieldset>
            </form>
        </section>

        <ul id="mood"></ul>

        <section>
            <dialog id="dialog">
                <!-- <button class="close-button">&#10005;</button> -->
                <div id="modal-results" class="modal-results"></div>
                <button class="back-to-beginning">Regenerate my drink</button>
            </dialog>
        </section>

 

    </body>
