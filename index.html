<!DOCTYPE html>

<html>
    <head>
        <title>Functions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="style.css" rel="stylesheet">
        <script src="assets/main.js" defer></script>
    </head>


    <body>
        <h1>Drinks Menu</h1>
        <form>
            <legend>What's your mood today?</legend>
            <section class="mood-buttons">
                <button type="button" id="bold">Bold</button>
                <button type="button" id="warmandcozy">Warm and cozy</button>
                <button type="button" id="joyful">Joyful</button>
                <button type="button" id="freshandalive">Fresh and alive</button>
                <button type="button" id="dreamy">Dreamy</button>
            </section>
            <div class="slider-container">
                <label for="intensity">Please drag the slider to select how strong you want your drink to be</label>
                <input type="range" id="intensity" min="0" max="3">
            </div>

            <div class="submit-button">
                <button type="submit">Submit</button>
            </div>
        </form>

        <ul id="mood"></ul>

        <section>
            <dialog id="dialog">
                <button class="close-button">Close</button>
                <div id="modal-results" class="modal-results"></div>
            </dialog>
        </section>

 

    </body>

</html>
