<!DOCTYPE html>

<html>
    <head>
        <title>Functions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="style.css" rel="stylesheet">
        <script src="assets/main.js" defer></script>
    </head>


    <body>
        <h1>Drinks Menu</h1>
        <form>
            <legend>What's your mood today?</legend>
            <section>
                <button type="button" id="bold">Bold</button>
                <button type="button" id="warmandcozy">Warm and cozy</button>
                <button type="button" id="joyful">Joyful</button>
                <button type="button" id="freshandalive">Fresh and alive</button>
                <button type="button" id="dreamy">Dreamy</button>
            </section>
            <div id="slider-container">
                <label for="intensity">How intense?</label>
                <input type="range" id="intensity" min="0" max="3">
            </div>
            <div>
                <button type="submit">Submit</button>
            </div>
        </form>

        <ul id="mood"></ul>

 

    </body>

</html>
