<html>
    <head>
        <title>Functions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="assets/favicon.svg" rel="icon" type="image/svg+xml">

        <link href="reset.css" rel="stylesheet">
        <link href="style.css" rel="stylesheet">
        <script src="assets/main.js" defer></script>

        <!-- Cormorant Garamond font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

        <!-- DM Sans font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">




        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Proza+Libre:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    </head>


    <body>
        <header id="hero" class="hero">
            <!-- <img src="Images/herotest.png" alt="Hero image" class="heroimage"> -->
            <div class="herotext">
                    <h1>How are you <em>feeling</em> tonight? </h1>
                    <p>Every cocktail tells a story. Whether you're winding down, celebrating, or somewhere in between, share your mood and we'll craft the perfect drink for you right now.</p>
            </div> 

            <!-- <img src="Images/heroimage.png" alt="Hero image" class="heroimage"> -->

             <a href="#input-section" class="herobutton">What's my drink?</a>
        </header>

    
        <main id="input-section" class="input-section">
            <!-- <section> -->
                <a href="#" class="back-to-top">Back to top</a>
            <!-- </section> -->

            <form>
                <fieldset>
                    <legend>What's your mood today?</legend>
                        <div class="mood-buttons">
                            <button type="button" id="bold">Bold</button>
                            <button type="button" id="warmandcozy">Warm and cozy</button>
                            <button type="button" id="joyful">Joyful</button>
                            <button type="button" id="freshandalive">Fresh and alive</button>
                            <button type="button" id="dreamy">Dreamy</button>
                        </div>   
                </fieldset> 
                              
                <fieldset>
                        <div class="slider-container">
                            <label for="intensity">Please drag the slider to select how strong you want your drink to be</label>
                            <input type="range" id="intensity" min="1" max="3">

                            <div class="slider-label">
                                <span>Light</span>
                                <span>Intense</span>
                            </div>
                        </div>
                </fieldset>
                    
                    <!-- <section> -->
                <button type="submit" class="submit-button" disabled>Find my drink</button>
                    <!-- </section> -->
                </fieldset>
            </form>
        </main>

        <ul id="mood"></ul>

        <section>
            <dialog id="dialog">
                <div id="modal-results" class="modal-results"></div>
                <div class="modal-button">
                    <button class="back-to-beginning">Regenerate my drink</button>
                </div>
            </dialog>
        </section>

 

    </body>

</html>
